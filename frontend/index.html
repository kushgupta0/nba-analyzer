<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CourtValue — NBA Contract Analyzer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #070b14;
      --bg2:       #0f172a;
      --surface:   rgba(30, 41, 59, 0.72);
      --surface2:  rgba(30, 41, 59, 0.48);
      --border:    rgba(51, 65, 85, 0.9);
      --text:      #e5e7eb;
      --muted:     #a6b0c2;
      --accent:    #60a5fa;
      --accent2:   #38bdf8;
      --green:     #22c55e;
      --red:       #ef4444;
      --gray:      #64748b;
      --shadow:    0 18px 45px rgba(0,0,0,0.35);
      --shadow2:   0 10px 26px rgba(0,0,0,0.30);
      --ring:      rgba(96,165,250,0.55);
      --radius:    14px;
    }

    body {
      background:
        radial-gradient(1100px 720px at 12% -8%, rgba(59,130,246,0.38), transparent 58%),
        radial-gradient(900px 600px at 92% 0%, rgba(34,197,94,0.18), transparent 52%),
        linear-gradient(180deg, var(--bg), var(--bg2));
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    @media (prefers-reduced-motion: reduce) {
      * { scroll-behavior: auto !important; transition: none !important; animation: none !important; }
    }

    /* ── Nav ── */
    header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(15, 23, 42, 0.62);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(51,65,85,0.65);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      box-shadow: 0 10px 28px rgba(0,0,0,0.22);
    }
    .logo {
      font-size: 1.3rem;
      font-weight: 800;
      letter-spacing: -0.6px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      color: transparent;
    }
    nav a { color: var(--muted); text-decoration: none; margin-left: 1.5rem; font-size: 0.92rem; font-weight: 600; }
    nav a:hover, nav a.active { color: var(--text); }

    /* ── Main ── */
    main { max-width: 1300px; margin: 0 auto; padding: 2.25rem 2rem; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Summary cards ── */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .card {
      position: relative;
      background: linear-gradient(180deg, rgba(30,41,59,0.82), rgba(30,41,59,0.52));
      border: 1px solid rgba(51,65,85,0.85);
      border-radius: var(--radius);
      padding: 1.15rem 1.35rem;
      box-shadow: 0 6px 18px rgba(0,0,0,0.18);
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease, background 0.18s ease;
      overflow: hidden;
      transform: translateZ(0);
    }
    .card::after {
      content: "";
      position: absolute;
      inset: -30% -10% auto -10%;
      height: 120px;
      background: radial-gradient(circle at 20% 20%, rgba(96,165,250,0.45), transparent 65%);
      opacity: 0;
      transition: opacity 0.18s ease;
      pointer-events: none;
    }
    .card:hover {
      transform: translateY(-3px);
      border-color: rgba(96,165,250,0.95);
      box-shadow: var(--shadow2);
    }
    .card:hover::after { opacity: 1; }
    .card-label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 700; }
    .card-value { font-size: 2.05rem; font-weight: 850; margin-top: 0.35rem; letter-spacing: -0.03em; }
    .card-value.green { color: var(--green); }
    .card-value.red   { color: var(--red); }
    .card-value.blue  { color: var(--accent); }

    /* ── Controls ── */
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 0.85rem;
      align-items: center;
      margin-bottom: 1.6rem;
    }
    input[type="text"] {
      flex: 1 1 230px;
      min-width: 185px;
      background: rgba(30,41,59,0.55);
      border: 1px solid rgba(51,65,85,0.85);
      color: var(--text);
      border-radius: 12px;
      padding: 0.55rem 1rem;
      font-size: 0.9rem;
      outline: none;
      width: auto;
      transition: box-shadow 0.15s ease, border-color 0.15s ease, transform 0.15s ease;
    }
    input[type="text"]:focus {
      border-color: rgba(96,165,250,0.95);
      box-shadow: 0 0 0 4px rgba(96,165,250,0.18);
    }

    select {
      background: rgba(30,41,59,0.55);
      border: 1px solid rgba(51,65,85,0.85);
      color: var(--text);
      border-radius: 12px;
      padding: 0.55rem 0.95rem;
      font-size: 0.9rem;
      cursor: pointer;
      transition: box-shadow 0.15s ease, border-color 0.15s ease;
    }
    select:focus {
      outline: none;
      border-color: rgba(96,165,250,0.95);
      box-shadow: 0 0 0 4px rgba(96,165,250,0.18);
    }

    .filter-btns {
      display: flex;
      gap: 0.45rem;
      flex-wrap: wrap;
      padding: 0.25rem;
      border-radius: 999px;
      border: 1px solid rgba(51,65,85,0.65);
      background: rgba(15,23,42,0.22);
    }
    .btn {
      padding: 0.42rem 0.95rem;
      border-radius: 20px;
      border: 1px solid rgba(51,65,85,0.85);
      background: rgba(2,6,23,0.15);
      color: var(--muted);
      font-size: 0.84rem;
      font-weight: 750;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease, border-color 0.15s ease, color 0.15s ease, box-shadow 0.15s ease;
    }
    .btn:hover {
      border-color: rgba(96,165,250,0.95);
      color: var(--text);
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(0,0,0,0.18);
    }
    .btn.active {
      background: linear-gradient(180deg, rgba(96,165,250,0.95), rgba(56,189,248,0.85));
      border-color: rgba(96,165,250,0.95);
      color: #07101f;
      box-shadow: 0 0 0 4px rgba(96,165,250,0.16), 0 18px 40px rgba(56,189,248,0.18);
    }

    /* ── Table ── */
    .table-wrap {
      overflow-x: auto;
      border-radius: var(--radius);
      border: 1px solid rgba(51,65,85,0.75);
      background: rgba(2,6,23,0.18);
      box-shadow: 0 10px 30px rgba(0,0,0,0.22);
      animation: fadeUp 0.35s ease both;
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.92rem; }
    thead { background: linear-gradient(180deg, rgba(30,41,59,0.92), rgba(30,41,59,0.55)); }
    th {
      padding: 0.85rem 1rem;
      text-align: left;
      color: var(--muted);
      font-size: 0.76rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
      font-weight: 800;
    }
    th:hover { color: var(--text); }
    th .sort-arrow { margin-left: 4px; opacity: 0.4; }
    th.sorted .sort-arrow { opacity: 1; }

    tbody tr {
      border-top: 1px solid rgba(51,65,85,0.6);
      cursor: pointer;
      transition: background 0.15s ease, transform 0.15s ease;
    }
    tbody tr:not(.detail-row):hover {
      background: rgba(59,130,246,0.08);
      transform: translateY(-1px);
    }

    td { padding: 0.85rem 1rem; white-space: nowrap; }
    td.name-cell { font-weight: 800; }
    td.team-cell { color: var(--muted); font-size: 0.82rem; }

    td:nth-child(4),
    td:nth-child(6),
    td:nth-child(7),
    td:nth-child(8) { text-align: right; font-variant-numeric: tabular-nums; }

    th:nth-child(4),
    th:nth-child(6),
    th:nth-child(7),
    th:nth-child(8) { text-align: right; }

    /* ── Badges ── */
    .badge {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .badge.UNDERPAID { background: rgba(34,197,94,0.16);  color: #34d399; border-color: rgba(52,211,153,0.35); }
    .badge.FAIR      { background: rgba(100,116,139,0.22); color: #cbd5e1; border-color: rgba(148,163,184,0.35); }
    .badge.OVERPAID  { background: rgba(239,68,68,0.16);  color: #f87171; border-color: rgba(248,113,113,0.35); }

    /* ── Expandable detail row ── */
    .detail-row td {
      padding: 0;
      background: linear-gradient(90deg, rgba(59,130,246,0.06), rgba(59,130,246,0.02));
    }
    .detail-inner {
      padding: 1rem 1.5rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 0.75rem;
    }
    .stat-block { }
    .stat-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; }
    .stat-val   { font-size: 1.1rem; font-weight: 600; margin-top: 2px; }
    .verdict-note {
      margin: 0 1.5rem 0.75rem;
      padding: 0.65rem 0.8rem;
      border-radius: 10px;
      border: 1px solid rgba(51,65,85,0.7);
      background: rgba(15,23,42,0.35);
      color: #cbd5e1;
      font-size: 0.78rem;
      line-height: 1.35;
    }

    /* ── Loading / error ── */
    #status {
      text-align: center;
      padding: 3rem;
      color: var(--muted);
      animation: fadeUp 0.35s ease both;
    }

    /* ── Responsive ── */
    @media (max-width: 640px) {
      main { padding: 1rem 0.9rem; }
      header { padding: 0 1rem; }
      .cards { grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); }
      .controls { flex-direction: column; align-items: stretch; gap: 0.75rem; }
      input[type="text"] { width: 100%; min-width: 0; flex: 1 1 auto; }
      select { width: 100%; }
      .filter-btns { border-radius: 14px; }
    }
  </style>
</head>
<body>

<header>
  <span class="logo">CourtValue</span>
  <nav>
    <a href="index.html" class="active">Players</a>
    <a href="teams.html">Teams</a>
  </nav>
</header>

<main>
  <!-- Summary cards -->
  <div class="cards">
    <div class="card">
      <div class="card-label">Players Analyzed</div>
      <div class="card-value blue" id="total">—</div>
    </div>
    <div class="card">
      <div class="card-label">Underpaid</div>
      <div class="card-value green" id="underpaid">—</div>
    </div>
    <div class="card">
      <div class="card-label">Fair Value</div>
      <div class="card-value" id="fair">—</div>
    </div>
    <div class="card">
      <div class="card-label">Overpaid</div>
      <div class="card-value red" id="overpaid">—</div>
    </div>
  </div>

  <!-- Filters -->
  <div class="controls">
    <input type="text" id="search" placeholder="Search player..." />

    <div class="filter-btns" id="verdict-btns">
      <button class="btn active" data-verdict="">All</button>
      <button class="btn" data-verdict="UNDERPAID">Underpaid</button>
      <button class="btn" data-verdict="FAIR">Fair</button>
      <button class="btn" data-verdict="OVERPAID">Overpaid</button>
    </div>

    <select id="hg-filter">
      <option value="">All Positions</option>
      <option>Guard</option>
      <option>Wing</option>
      <option>Forward</option>
      <option>Big</option>
    </select>

    <select id="tier-filter">
      <option value="">All Tiers</option>
      <option>Minimum</option>
      <option>Role Player</option>
      <option>Starter</option>
      <option>Star</option>
      <option>Max</option>
    </select>
  </div>

  <!-- Table -->
  <div id="status">Loading data…</div>
  <div class="table-wrap" id="table-wrap" style="display:none">
    <table>
      <thead>
        <tr>
          <th data-col="name">Player <span class="sort-arrow">↕</span></th>
          <th data-col="team">Team <span class="sort-arrow">↕</span></th>
          <th data-col="hg">Position <span class="sort-arrow">↕</span></th>
          <th data-col="salary">Salary ($M) <span class="sort-arrow">↕</span></th>
          <th data-col="tier">Tier <span class="sort-arrow">↕</span></th>
          <th data-col="score">Score <span class="sort-arrow">↕</span></th>
          <th data-col="vpd">Value/$ <span class="sort-arrow">↕</span></th>
          <th data-col="peer_rank">Peer Rank <span class="sort-arrow">↕</span></th>
          <th data-col="verdict">Verdict <span class="sort-arrow">↕</span></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</main>

<script>
  // Use same-origin so this works locally and when deployed (Render, etc.)
  // If you ever host the frontend separately, set `window.COURTVALUE_API_BASE`
  // before this script runs.
  const API = (window.COURTVALUE_API_BASE || window.location.origin).replace(/\/$/, '');
  let allPlayers = [];
  let sortCol = 'vpd';
  let sortDir = -1; // -1 = desc
  let activeVerdict = '';

  async function load() {
    try {
      const [summary, players] = await Promise.all([
        fetch(`${API}/api/stats/summary`).then(r => r.json()),
        fetch(`${API}/api/players`).then(r => r.json()),
      ]);

      document.getElementById('total').textContent     = summary.total_players;
      document.getElementById('underpaid').textContent = summary.underpaid_count;
      document.getElementById('fair').textContent      = summary.fair_count;
      document.getElementById('overpaid').textContent  = summary.overpaid_count;

      allPlayers = players;
      document.getElementById('status').style.display = 'none';
      document.getElementById('table-wrap').style.display = '';
      render();
    } catch (e) {
      document.getElementById('status').textContent =
        '⚠ Could not reach API. Make sure the server is running: uvicorn api:app --reload --port 8000';
    }
  }

  function filtered() {
    const q       = document.getElementById('search').value.toLowerCase();
    const hg      = document.getElementById('hg-filter').value;
    const tier    = document.getElementById('tier-filter').value;

    return allPlayers.filter(p => {
      if (activeVerdict && p.verdict !== activeVerdict) return false;
      if (hg   && p.hg   !== hg)   return false;
      if (tier && p.tier !== tier)  return false;
      if (q    && !(p.name||'').toLowerCase().includes(q)) return false;
      return true;
    });
  }

  function render() {
    const data = filtered().sort((a, b) => {
      const av = a[sortCol] ?? 0, bv = b[sortCol] ?? 0;
      if (typeof av === 'string') return sortDir * av.localeCompare(bv);
      return sortDir * (av - bv);
    });

    // Update sort arrows
    document.querySelectorAll('th').forEach(th => {
      th.classList.toggle('sorted', th.dataset.col === sortCol);
      const arrow = th.querySelector('.sort-arrow');
      if (arrow) arrow.textContent = th.dataset.col === sortCol ? (sortDir === -1 ? '↓' : '↑') : '↕';
    });

    const tbody = document.getElementById('tbody');
    tbody.innerHTML = '';

    data.forEach(p => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td class="name-cell">${esc(p.name)}</td>
        <td class="team-cell">${esc(p.team||'—')}</td>
        <td>${esc(p.hg)}</td>
        <td>$${(+p.salary||0).toFixed(1)}M</td>
        <td>${esc(p.tier)}</td>
        <td>${(+p.score||0).toFixed(1)}</td>
        <td>${(+p.vpd||0).toFixed(2)}</td>
        <td>#${p.peer_rank}</td>
        <td><span class="badge ${p.verdict}">${p.verdict}</span></td>
      `;

      // Expand / collapse detail row
      const detail = document.createElement('tr');
      detail.className = 'detail-row';
      detail.style.display = 'none';
      detail.innerHTML = `<td colspan="9"><div class="detail-inner">
        ${statBlock('PER', p.per != null ? (+p.per).toFixed(1) : '—')}
        ${statBlock('OWS', p.ows != null ? (+p.ows).toFixed(2) : '—')}
        ${statBlock('DWS', p.dws != null ? (+p.dws).toFixed(2) : '—')}
        ${statBlock('TS%', p.ts != null ? (p.ts*100).toFixed(1)+'%' : '—')}
        ${statBlock('TOV%', p.tov != null ? (p.tov).toFixed(1)+'%' : '—')}
        ${statBlock('Games', p.games)}
        ${statBlock('Win Shares', (p.ows||0)+(p.dws||0) > 0 ? ((p.ows||0)+(p.dws||0)).toFixed(1) : '—')}
        ${statBlock('Height', p.height||'—')}
        ${statBlock('Composite', p.score)}
      </div>
      <div class="verdict-note">${esc(p.verdict_explanation || 'No explanation available.')}</div>
      <p style="font-size:0.7rem;color:#64748b;padding:0 1.5rem 0.75rem">
        * Composite uses PER, OWS, DWS, TS%, and availability.
      </p></td>`;

      tr.addEventListener('click', () => {
        detail.style.display = detail.style.display === 'none' ? '' : 'none';
      });

      tbody.appendChild(tr);
      tbody.appendChild(detail);
    });
  }

  function statBlock(label, val) {
    return `<div class="stat-block">
      <div class="stat-label">${label}</div>
      <div class="stat-val">${val ?? '—'}</div>
    </div>`;
  }

  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Sort
  document.querySelectorAll('th[data-col]').forEach(th => {
    th.addEventListener('click', () => {
      if (sortCol === th.dataset.col) sortDir *= -1;
      else { sortCol = th.dataset.col; sortDir = -1; }
      render();
    });
  });

  // Verdict filter buttons
  document.getElementById('verdict-btns').addEventListener('click', e => {
    const btn = e.target.closest('[data-verdict]');
    if (!btn) return;
    activeVerdict = btn.dataset.verdict;
    document.querySelectorAll('#verdict-btns .btn').forEach(b => b.classList.toggle('active', b === btn));
    render();
  });

  // Search + dropdowns
  document.getElementById('search').addEventListener('input', render);
  document.getElementById('hg-filter').addEventListener('change', render);
  document.getElementById('tier-filter').addEventListener('change', render);

  load();
</script>
</body>
</html>
