<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CourtValue — Teams</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #070b14;
      --bg2: #0f172a;
      --surface: rgba(30, 41, 59, 0.72);
      --surface2: rgba(30, 41, 59, 0.48);
      --border: rgba(51, 65, 85, 0.9);
      --text: #e5e7eb;
      --muted: #a6b0c2;
      --accent: #60a5fa;
      --accent2: #38bdf8;
      --green: #22c55e;
      --red: #ef4444;
      --shadow: 0 18px 45px rgba(0,0,0,0.35);
      --shadow2: 0 10px 26px rgba(0,0,0,0.30);
      --radius: 14px;
    }
    body {
      background:
        radial-gradient(1100px 720px at 12% -8%, rgba(59,130,246,0.38), transparent 58%),
        radial-gradient(900px 600px at 92% 0%, rgba(34,197,94,0.18), transparent 52%),
        linear-gradient(180deg, var(--bg), var(--bg2));
      color: var(--text);
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    @media (prefers-reduced-motion: reduce) {
      * { scroll-behavior: auto !important; transition: none !important; animation: none !important; }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    header {
      position: sticky;
      top: 0;
      z-index: 20;
      background: rgba(15, 23, 42, 0.62);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(51,65,85,0.65);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      box-shadow: 0 10px 28px rgba(0,0,0,0.22);
    }
    .logo {
      font-size: 1.3rem;
      font-weight: 800;
      letter-spacing: -0.6px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      color: transparent;
    }
    nav a { color: var(--muted); text-decoration: none; margin-left: 1.5rem; font-size: 0.92rem; font-weight: 600; }
    nav a:hover, nav a.active { color: var(--text); }

    main { max-width: 1300px; margin: 0 auto; padding: 2.25rem 2rem; }

    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
    .sub { color: var(--muted); margin-bottom: 2rem; font-size: 0.9rem; }

    .team-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }

    .team-card {
      position: relative;
      background: linear-gradient(180deg, rgba(30,41,59,0.82), rgba(30,41,59,0.52));
      border: 1px solid rgba(51,65,85,0.85);
      border-radius: var(--radius);
      padding: 1.25rem;
      box-shadow: 0 6px 18px rgba(0,0,0,0.18);
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
      overflow: hidden;
      animation: fadeUp 0.35s ease both;
    }
    .team-card::after {
      content: "";
      position: absolute;
      inset: -30% -10% auto -10%;
      height: 120px;
      background: radial-gradient(circle at 20% 20%, rgba(96,165,250,0.45), transparent 65%);
      opacity: 0;
      transition: opacity 0.18s ease;
      pointer-events: none;
    }
    .team-card:hover {
      transform: translateY(-3px);
      border-color: rgba(96,165,250,0.95);
      box-shadow: var(--shadow2);
    }
    .team-card:hover::after { opacity: 1; }

    .team-name { font-size: 1.05rem; font-weight: 850; margin-bottom: 0.8rem; letter-spacing: -0.02em; }
    .team-stats { display: flex; gap: 1rem; font-size: 0.86rem; color: var(--muted); }
    .team-stats strong { color: var(--text); display: block; font-size: 1.1rem; font-weight: 850; }

    .badge {
      display: inline-block; padding: 0.15rem 0.5rem; border-radius: 20px;
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .badge.UNDERPAID { background: rgba(34,197,94,0.16); color: #34d399; border-color: rgba(52,211,153,0.35); }
    .badge.FAIR      { background: rgba(100,116,139,0.22); color: #cbd5e1; border-color: rgba(148,163,184,0.35); }
    .badge.OVERPAID  { background: rgba(239,68,68,0.16);  color: #f87171; border-color: rgba(248,113,113,0.35); }

    .players-list { margin-top: 0.75rem; border-top: 1px solid var(--border); padding-top: 0.75rem; }
    .player-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.42rem 0; font-size: 0.86rem;
      transition: transform 0.15s ease, color 0.15s ease;
    }
    .player-row:not(:last-child) { border-bottom: 1px solid rgba(51,65,85,0.5); }
    .player-row:hover { transform: translateX(2px); color: var(--text); }

    #status { text-align: center; padding: 3rem; color: var(--muted); animation: fadeUp 0.35s ease both; }

    @media (max-width: 640px) {
      main { padding: 1rem 0.9rem; }
      header { padding: 0 1rem; }
      .team-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<header>
  <span class="logo">CourtValue</span>
  <nav>
    <a href="index.html">Players</a>
    <a href="teams.html" class="active">Teams</a>
  </nav>
</header>

<main>
  <h1>Team Breakdown</h1>
  <p class="sub">Contract value aggregated by team. Click a card to see the full roster.</p>

  <div id="status">Loading…</div>
  <div class="team-grid" id="grid"></div>
</main>

<script>
  // Use same-origin so this works locally and when deployed (Render, etc.)
  // If you ever host the frontend separately, set `window.COURTVALUE_API_BASE`
  // before this script runs.
  const API = (window.COURTVALUE_API_BASE || window.location.origin).replace(/\/$/, '');

  async function load() {
    try {
      const players = await fetch(`${API}/api/players`).then(r => r.json());

      // Group by team
      const teams = {};
      players.forEach(p => {
        const t = p.team || 'N/A';
        if (!teams[t]) teams[t] = [];
        teams[t].push(p);
      });

      document.getElementById('status').style.display = 'none';
      const grid = document.getElementById('grid');

      Object.entries(teams)
        .sort(([a], [b]) => a.localeCompare(b))
        .forEach(([teamAbbr, roster]) => {
          roster.sort((a, b) => (b.vpd || 0) - (a.vpd || 0));

          const under = roster.filter(p => p.verdict === 'UNDERPAID').length;
          const fair  = roster.filter(p => p.verdict === 'FAIR').length;
          const over  = roster.filter(p => p.verdict === 'OVERPAID').length;
          const avgSal = (roster.reduce((s, p) => s + (p.salary || 0), 0) / roster.length).toFixed(1);
          const avgScore = (roster.reduce((s, p) => s + (p.score || 0), 0) / roster.length).toFixed(1);

          const card = document.createElement('div');
          card.className = 'team-card';
          card.innerHTML = `
            <div class="team-name">${esc(teamAbbr)}</div>
            <div class="team-stats">
              <div><strong>${roster.length}</strong> Players</div>
              <div><strong>$${avgSal}M</strong> Avg Salary</div>
              <div><strong>${avgScore}</strong> Avg Score</div>
            </div>
            <div class="team-stats" style="margin-top:0.5rem; gap:0.5rem">
              <span class="badge UNDERPAID">${under} Under</span>
              <span class="badge FAIR">${fair} Fair</span>
              <span class="badge OVERPAID">${over} Over</span>
            </div>
            <div class="players-list">
              ${roster.slice(0, 5).map(p => `
                <div class="player-row">
                  <span>${esc(p.name)}</span>
                  <span>
                    <span style="color:#94a3b8;font-size:0.78rem">${(+p.vpd||0).toFixed(2)} vpd &nbsp;</span>
                    <span class="badge ${p.verdict}">${p.verdict}</span>
                  </span>
                </div>`).join('')}
              ${roster.length > 5 ? `<div style="color:#64748b;font-size:0.78rem;padding-top:0.4rem">+${roster.length - 5} more</div>` : ''}
            </div>`;
          grid.appendChild(card);
        });
    } catch (e) {
      document.getElementById('status').textContent =
        '⚠ Could not reach API. Make sure the server is running: uvicorn api:app --reload --port 8000';
    }
  }

  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  load();
</script>
</body>
</html>
